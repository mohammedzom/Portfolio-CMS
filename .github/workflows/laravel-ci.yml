name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # CI
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, mbstring, openssl, pcre, phar, session, tokenizer, xml, xmlwriter
        coverage: none

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Composer Dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Create Database for Testing
      run: |
        touch database/database.sqlite
        sed -i -e 's/DB_CONNECTION=mysql/DB_CONNECTION=sqlite/' .env
        sed -i -e '/DB_DATABASE/d' .env

    - name: Run Migrations
      run: php artisan migrate --force

    - name: Run Tests
      run: php artisan test

  # CD
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /home/mohammed/web/api.mohammedzomlot.online/public_html

          php artisan down || true

          git pull origin main

          composer install --no-interaction --prefer-dist --optimize-autoloader

          php artisan migrate --force

          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache

          php artisan up
