name: Laravel CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # CI
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.5'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, dom, filter, gd, iconv, json, libxml, mbstring, openssl, pcre, phar, session, tokenizer, xml, xmlwriter
        coverage: none

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install Composer Dependencies
      run: composer install --prefer-dist --no-progress --no-interaction

    - name: Generate Application Key
      run: php artisan key:generate

    - name: Create Database for Testing
      run: |
        touch database/database.sqlite
        sed -i -e 's/^DB_CONNECTION=.*/DB_CONNECTION=sqlite/' .env
        sed -i -e '/DB_DATABASE/d' .env

    - name: Clear Cached Configuration
      run: php artisan config:clear

    - name: Run Migrations
      run: php artisan migrate --force

    - name: Run Tests
      run: php artisan test --compact

  # CD
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
    - name: Deploy to Server via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USERNAME }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          set -eu

          APP_ROOT="/home/mohammed/web/api.mohammedzomlot.online"
          RELEASES_DIR="$APP_ROOT/releases"
          SHARED_DIR="$APP_ROOT/shared"
          CURRENT_LINK="$APP_ROOT/current"
          RELEASE_NAME="$(date +%Y%m%d%H%M%S)"
          RELEASE_DIR="$RELEASES_DIR/$RELEASE_NAME"

          mkdir -p "$RELEASES_DIR" \
            "$SHARED_DIR/storage/app/public" \
            "$SHARED_DIR/storage/framework/cache" \
            "$SHARED_DIR/storage/framework/sessions" \
            "$SHARED_DIR/storage/framework/views" \
            "$SHARED_DIR/storage/logs"

          git clone --depth=1 --branch main git@github.com:${{ github.repository }}.git "$RELEASE_DIR"

          ln -sfn "$SHARED_DIR/.env" "$RELEASE_DIR/.env"
          rm -rf "$RELEASE_DIR/storage"
          ln -sfn "$SHARED_DIR/storage" "$RELEASE_DIR/storage"

          cd "$RELEASE_DIR"

          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

          php artisan migrate --force
          php artisan optimize:clear
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache
          php artisan storage:link || true

          ln -sfn "$RELEASE_DIR" "$APP_ROOT/current_tmp"
          mv -Tf "$APP_ROOT/current_tmp" "$CURRENT_LINK"

          cd "$CURRENT_LINK"
          php artisan queue:restart
          php -r 'if (function_exists("opcache_reset")) { opcache_reset(); }'

          ls -1dt "$RELEASES_DIR"/* | tail -n +4 | xargs -r rm -rf
